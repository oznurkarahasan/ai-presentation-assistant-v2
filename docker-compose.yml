version: '3.8'

services:
  # 1. DATABASE (PostgreSQL + pgvector) - Port: 5436
  db_v2:
    image: ankane/pgvector:latest
    container_name: presentation_db_v2
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin}
      POSTGRES_DB: ${DB_NAME:-presentation_db_v2}
    ports:
      - "5436:5432"
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - presentation_network_v2

  # 2. BACKEND (FastAPI) - Port: 8001
  backend_v2:
    build: ./backend
    container_name: presentation_backend_v2
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-admin}:${DB_PASSWORD:-admin}@db_v2:5432/${DB_NAME:-presentation_db_v2}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME}
      - FRONTEND_URL=${FRONTEND_URL}
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost:3001","http://localhost:3000"]}
    depends_on:
      - db_v2
    networks:
      - presentation_network_v2

  # 3. FRONTEND (Next.js) - Port: 3001
  frontend_v2:
    build: ./frontend
    container_name: presentation_frontend_v2
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001
      - NEXT_PUBLIC_WS_URL=ws://localhost:8001
      - HOSTNAME=0.0.0.0
    depends_on:
      - backend_v2
    networks:
      - presentation_network_v2

volumes:
  postgres_data_v2:

networks:
  presentation_network_v2:
    driver: bridge